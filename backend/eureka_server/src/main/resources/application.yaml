spring:
  application:
    name: eureka-server
  config:
    import: optional:configserver:http://config-server-service:9071
#    import: optional:configserver:http://localhost:9071
logging:
  pattern:
    console: ${CONSOLE_LOG_PATTERN:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)}
  level:
    root: INFO
    com:
      ps:
        backend: DEBUG
  file:
    name: /logs/${spring.application.name}.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB